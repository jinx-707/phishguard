<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PhishGuard Scanner</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🛡️ PhishGuard</h1>
    </div>
    
    <div class="content">
      <div id="status" class="status">
        <div class="status-indicator">
          <div class="spinner"></div>
        </div>
        <p class="status-text">Scanning page...</p>
      </div>

      <div id="result" class="result hidden">
        <div class="risk-badge">
          <span id="risk-level">-</span>
        </div>
        
        <div class="details">
          <div class="detail-row">
            <span class="label">Confidence:</span>
            <span id="confidence" class="value">-</span>
          </div>
          
          <div class="detail-row">
            <span class="label">URL:</span>
            <span id="url" class="value url-text">-</span>
          </div>
          
          <div id="reasons-container" class="reasons hidden">
            <span class="label">Reasons:</span>
            <ul id="reasons-list"></ul>
          </div>
        </div>
      </div>

      <div id="error" class="error hidden">
        <p>⚠️ Unable to connect to backend</p>
      </div>
    </div>

    <div class="footer">
      <p class="footer-text">Last scan: <span id="timestamp">-</span></p>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
