name: PhishGuard CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.11"
  IMAGE_NAME: phishguard-api

# ─── Jobs ──────────────────────────────────────────────────────────────────────
jobs:
  # ── 1. Lint & Type-check ─────────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: phishguard

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install lint dependencies
        run: pip install flake8 mypy isort black

      - name: black (formatting)
        run: black --check app/ intelligence/

      - name: isort (import order)
        run: isort --check-only app/ intelligence/

      - name: flake8 (style)
        run: flake8 app/ intelligence/ --max-line-length=110 --extend-ignore=E203,W503

      - name: mypy (type checking)
        run: mypy app/ --ignore-missing-imports --no-strict-optional
        continue-on-error: true   # non-blocking until all stubs are added

  # ── 2. Unit & Integration Tests ───────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: phishguard

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER:     postgres
          POSTGRES_PASSWORD: postgres1234
          POSTGRES_DB:       threat_intel_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL:          postgresql+asyncpg://postgres:postgres1234@localhost:5432/threat_intel_test
      REDIS_URL:             redis://localhost:6379/0
      CELERY_BROKER_URL:     redis://localhost:6379/1
      CELERY_RESULT_BACKEND: redis://localhost:6379/1
      SECRET_KEY:            test-secret-key-not-for-production
      ENVIRONMENT:           test
      DEBUG:                 "true"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests with coverage
        run: |
          pytest tests/ \
            --cov=app \
            --cov-report=xml \
            --cov-report=term-missing \
            --asyncio-mode=auto \
            -v

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: phishguard/coverage.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ── 3. Security Scan (Bandit SAST) ────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: phishguard

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Bandit
        run: pip install bandit[toml]

      - name: Run Bandit SAST
        run: bandit -r app/ intelligence/ -ll -ii --exclude tests/
        continue-on-error: true   # report only; tighten to fail on HIGH later

  # ── 4. Docker Build ───────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build & Smoke Test
    runs-on: ubuntu-latest
    needs: [test]
    defaults:
      run:
        working-directory: phishguard

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context:   phishguard
          file:      phishguard/Dockerfile
          push:      false
          tags:      ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Smoke-test container
        run: |
          docker run -d --name smoke \
            -e DATABASE_URL=sqlite+aiosqlite:///./test.db \
            -e REDIS_URL=redis://localhost:6379/0 \
            -e SECRET_KEY=ci-test-secret \
            -e ENVIRONMENT=test \
            -p 8000:8000 \
            ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            uvicorn app.main:app --host 0.0.0.0 --port 8000 || true
          sleep 8
          curl -f http://localhost:8000/health || echo "Smoke test skipped (no Redis in smoke)"
          docker rm -f smoke || true

  # ── 5. Deploy to Staging (main branch only) ───────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Push image to ECR
        run: |
          IMAGE_URI="${{ steps.login-ecr.outputs.registry }}/${{ env.IMAGE_NAME }}"
          docker tag ${{ env.IMAGE_NAME }}:${{ github.sha }} $IMAGE_URI:${{ github.sha }}
          docker tag ${{ env.IMAGE_NAME }}:${{ github.sha }} $IMAGE_URI:latest
          docker push $IMAGE_URI:${{ github.sha }}
          docker push $IMAGE_URI:latest

      - name: Deploy to ECS (rolling update)
        run: |
          aws ecs update-service \
            --cluster ${{ secrets.ECS_CLUSTER }} \
            --service ${{ secrets.ECS_SERVICE }} \
            --force-new-deployment \
            --region ${{ secrets.AWS_REGION }}
